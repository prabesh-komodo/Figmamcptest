<template>
    <lightning-card>
        <lightning-tabset active-tab-value="details">
            <lightning-tab label="Details" value="details">
                <div class="slds-p-around_medium">
                    <p class="model-text">Model: GPT</p>
                    <section class="section-block">
                        <div class="section-header">Contact Information</div>

                        <div class="slds-grid slds-wrap slds-gutters_small slds-m-top_small">
                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <div class="owner-field">
                                    <div class="field-label">Owner</div>
                                    <div class="owner-value">
                                        <lightning-icon icon-name="standard:user" size="x-small" class="slds-m-right_xx-small"></lightning-icon>
                                        <span class="owner-name">{ownerName}</span>
                                    </div>
                                </div>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <lightning-input type="tel" label="Phone" value={form.Phone} data-field="Phone" onchange={handleInputChange}></lightning-input>
                            </div>

                            <div class="slds-col slds-size_1-of-1">
                                <div class="group-label"><abbr class="slds-required" title="required">*</abbr> Name</div>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <lightning-combobox
                                    label="Salutation"
                                    value={form.Salutation}
                                    options={salutationOptions}
                                    data-field="Salutation"
                                    onchange={handleInputChange}
                                ></lightning-combobox>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <lightning-input type="tel" label="Home Phone" value={form.HomePhone} data-field="HomePhone" onchange={handleInputChange}></lightning-input>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <lightning-input type="text" label="First Name" value={form.FirstName} data-field="FirstName" onchange={handleInputChange}></lightning-input>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <lightning-input type="tel" label="Other Phone" value={form.OtherPhone} data-field="OtherPhone" onchange={handleInputChange}></lightning-input>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <lightning-input type="text" label="Middle Name" value={form.MiddleName} data-field="MiddleName" onchange={handleInputChange}></lightning-input>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <lightning-input type="tel" label="Fax" value={form.Fax} data-field="Fax" onchange={handleInputChange}></lightning-input>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <lightning-input type="text" required label="Last Name" value={form.LastName} data-field="LastName" onchange={handleInputChange}></lightning-input>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <lightning-input type="email" label="Email" value={form.Email} data-field="Email" onchange={handleInputChange}></lightning-input>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <lightning-input type="text" label="Title" value={form.Title} data-field="Title" onchange={handleInputChange}></lightning-input>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <lightning-input type="text" label="Assistant" value={form.AssistantName} data-field="AssistantName" onchange={handleInputChange}></lightning-input>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <lightning-input type="text" label="Department" value={form.Department} data-field="Department" onchange={handleInputChange}></lightning-input>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <lightning-input type="tel" label="Asst. Phone" value={form.AssistantPhone} data-field="AssistantPhone" onchange={handleInputChange}></lightning-input>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <lightning-input type="date" label="Birthdate" value={form.Birthdate} data-field="Birthdate" onchange={handleInputChange}></lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"></div>

                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <lightning-record-picker
                                    label="Reports To"
                                    placeholder="Search Contacts..."
                                    object-api-name="Contact"
                                    value={form.ReportsToId}
                                    onchange={handleReportsToChange}
                                ></lightning-record-picker>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"></div>

                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <lightning-record-picker
                                    label="Lead Source"
                                    placeholder="Search Leads..."
                                    object-api-name="Lead"
                                    value={leadSourceRecordId}
                                    onchange={handleLeadSourceLookupChange}
                                ></lightning-record-picker>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"></div>
                        </div>
                    </section>

                    <section class="section-block">
                        <div class="section-header">Address Information</div>

                        <div class="slds-grid slds-wrap slds-gutters_small slds-m-top_small">
                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2 group-label">Mailing Address</div>
                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2 group-label">Other Address</div>

                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <lightning-textarea label="Mailing Street" value={form.MailingStreet} data-field="MailingStreet" onchange={handleInputChange}></lightning-textarea>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <lightning-textarea label="Other Street" value={form.OtherStreet} data-field="OtherStreet" onchange={handleInputChange}></lightning-textarea>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <div class="slds-grid slds-wrap slds-gutters_x-small">
                                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                        <lightning-input type="text" label="Mailing City" value={form.MailingCity} data-field="MailingCity" onchange={handleInputChange}></lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                        <lightning-input type="text" label="Mailing State/Province" value={form.MailingState} data-field="MailingState" onchange={handleInputChange}></lightning-input>
                                    </div>
                                </div>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <div class="slds-grid slds-wrap slds-gutters_x-small">
                                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                        <lightning-input type="text" label="Other City" value={form.OtherCity} data-field="OtherCity" onchange={handleInputChange}></lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                        <lightning-input type="text" label="Other State/Province" value={form.OtherState} data-field="OtherState" onchange={handleInputChange}></lightning-input>
                                    </div>
                                </div>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <div class="slds-grid slds-wrap slds-gutters_x-small">
                                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                        <lightning-input
                                            type="text"
                                            label="Mailing Zip/Postal Code"
                                            value={form.MailingPostalCode}
                                            data-field="MailingPostalCode"
                                            onchange={handleInputChange}
                                        ></lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                        <lightning-input type="text" label="Mailing Country" value={form.MailingCountry} data-field="MailingCountry" onchange={handleInputChange}></lightning-input>
                                    </div>
                                </div>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <div class="slds-grid slds-wrap slds-gutters_x-small">
                                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                        <lightning-input
                                            type="text"
                                            label="Other Zip/Postal Code"
                                            value={form.OtherPostalCode}
                                            data-field="OtherPostalCode"
                                            onchange={handleInputChange}
                                        ></lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                        <lightning-input type="text" label="Other Country" value={form.OtherCountry} data-field="OtherCountry" onchange={handleInputChange}></lightning-input>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section class="section-block">
                        <div class="section-header">Description Information</div>
                        <div class="slds-m-top_small">
                            <lightning-textarea label="Description" value={form.Description} data-field="Description" onchange={handleInputChange}></lightning-textarea>
                        </div>
                    </section>

                    <div class="slds-m-top_medium slds-clearfix">
                        <div class="slds-float_right">
                            <lightning-button label="Cancel" variant="neutral" onclick={handleCancel} class="slds-m-right_x-small"></lightning-button>
                            <lightning-button label="Save" variant="brand" onclick={handleSave} disabled={isSaving}></lightning-button>
                        </div>
                    </div>
                </div>
            </lightning-tab>
            <lightning-tab label="User Roles" value="userRoles">
                <div class="slds-p-around_medium">
                    <p class="model-text">Model: GPT</p>
                </div>
            </lightning-tab>
        </lightning-tabset>
    </lightning-card>
</template>
