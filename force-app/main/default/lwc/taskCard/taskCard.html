<template>
  <div
    class="task-card slds-p-top_medium slds-p-horizontal_medium slds-p-bottom_small"
  >
    <!-- Task Header -->
    <div
      class="slds-grid slds-grid_vertical-align-center slds-grid_align-spread slds-m-bottom_small"
    >
      <div class="slds-col slds-p-right_small">
        <span class="task-card__title slds-truncate">{taskTitle}</span>
      </div>
      <div class="slds-grid slds-grid_vertical-align-center slds-shrink-none">
        <span
          class="task-card__status-badge slds-p-horizontal_x-small slds-p-vertical_xx-small slds-m-right_x-small"
        >
          {taskStatus}
        </span>
        <lightning-button-icon
          icon-name="utility:edit"
          variant="border"
          size="small"
          alternative-text="Edit task"
        >
        </lightning-button-icon>
      </div>
    </div>

    <!-- Task Instructions -->
    <div class="slds-m-bottom_small">
      <p class="task-card__label slds-m-bottom_none">Description</p>
      <p class="task-card__body-text slds-m-top_none">{taskDescription}</p>
    </div>

    <!-- Divider -->
    <div class="slds-border_top slds-m-top_x-small slds-m-bottom_x-small"></div>

    <!-- Task Metadata -->
    <div class="slds-grid slds-m-bottom_xx-small">
      <div class="slds-m-right_x-large">
        <p class="task-card__label slds-m-bottom_none">Due Date</p>
        <p class="task-card__body-text slds-m-top_none">{dueDate}</p>
      </div>
      <div class="slds-col">
        <p class="task-card__label slds-m-bottom_none">Assigned To</p>
        <div class="slds-grid slds-grid_vertical-align-center slds-m-top_none">
          <lightning-icon
            icon-name="utility:user"
            size="xx-small"
            class="task-card__user-icon slds-m-right_xx-small"
          >
          </lightning-icon>
          <span class="task-card__assignee">{assignedTo}</span>
        </div>
      </div>
    </div>

    <!-- Divider -->
    <div class="slds-border_top slds-m-top_x-small slds-m-bottom_x-small"></div>

    <!-- Task Actions -->
    <div
      class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center"
    >
      <lightning-button
        label="Transfer"
        icon-name="utility:product_transfer"
        icon-position="left"
        variant="neutral"
        onclick={handleTransfer}
      >
      </lightning-button>
      <lightning-button
        label="View Activity"
        icon-name="utility:preview"
        icon-position="left"
        variant="brand"
        onclick={handleViewActivity}
      >
      </lightning-button>
    </div>
  </div>
</template>
