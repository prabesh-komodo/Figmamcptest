<template>
  <div class="studio-root">
    <!-- Toolbar -->
    <div class="studio-toolbar">
      <div class="toolbar-left">
        <span class="toolbar-title">Node Based Workflow Generator</span>
      </div>
      <div class="toolbar-center">
        <button
          class="toolbar-btn"
          title="Undo"
          data-action="undo"
          onclick={handleToolbarAction}
        >
          <svg width="16" height="16" viewBox="0 0 16 16">
            <path
              d="M4.5 7.5L1 4l3.5-3.5M1.5 4H11a4 4 0 010 8H8"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
        <button
          class="toolbar-btn"
          title="Redo"
          data-action="redo"
          onclick={handleToolbarAction}
        >
          <svg width="16" height="16" viewBox="0 0 16 16">
            <path
              d="M11.5 7.5L15 4l-3.5-3.5M14.5 4H5a4 4 0 000 8h3"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
        <span class="toolbar-divider"></span>
        <button
          class="toolbar-btn"
          title="Zoom In"
          data-action="zoomIn"
          onclick={handleToolbarAction}
        >
          <svg width="16" height="16" viewBox="0 0 16 16">
            <circle
              cx="7"
              cy="7"
              r="5.5"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            />
            <path
              d="M11 11l3.5 3.5M7 4.5v5M4.5 7h5"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
        </button>
        <button
          class="toolbar-btn"
          title="Zoom Out"
          data-action="zoomOut"
          onclick={handleToolbarAction}
        >
          <svg width="16" height="16" viewBox="0 0 16 16">
            <circle
              cx="7"
              cy="7"
              r="5.5"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            />
            <path
              d="M11 11l3.5 3.5M4.5 7h5"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
        </button>
        <button
          class="toolbar-btn"
          title="Fit to Screen"
          data-action="fitToScreen"
          onclick={handleToolbarAction}
        >
          <svg width="16" height="16" viewBox="0 0 16 16">
            <path
              d="M1 5V1h4M11 1h4v4M15 11v4h-4M5 15H1v-4"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
        <span class="toolbar-divider"></span>
        <button
          class="toolbar-btn"
          title="Auto Layout"
          data-action="autoLayout"
          onclick={handleToolbarAction}
        >
          <svg width="16" height="16" viewBox="0 0 16 16">
            <rect
              x="5"
              y="1"
              width="6"
              height="4"
              rx="1"
              fill="none"
              stroke="currentColor"
              stroke-width="1.3"
            />
            <rect
              x="1"
              y="11"
              width="6"
              height="4"
              rx="1"
              fill="none"
              stroke="currentColor"
              stroke-width="1.3"
            />
            <rect
              x="9"
              y="11"
              width="6"
              height="4"
              rx="1"
              fill="none"
              stroke="currentColor"
              stroke-width="1.3"
            />
            <path
              d="M8 5v3M8 8L4 11M8 8l4 3"
              fill="none"
              stroke="currentColor"
              stroke-width="1.3"
              stroke-linecap="round"
            />
          </svg>
        </button>
      </div>
      <div class="toolbar-right">
        <button
          class="toolbar-btn toolbar-btn--accent"
          title="Run Animation"
          data-action="runAnimation"
          onclick={handleToolbarAction}
        >
          <svg width="16" height="16" viewBox="0 0 16 16">
            <path d="M4 2l10 6-10 6V2z" fill="currentColor" />
          </svg>
          <span class="toolbar-btn-label">Run</span>
        </button>
      </div>
    </div>

    <div class="studio-body">
      <!-- Sidebar Palette -->
      <div class="studio-sidebar">
        <div class="sidebar-section-title">Workflow Steps</div>
        <template for:each={paletteItems} for:item="item">
          <div
            key={item.type}
            class="palette-item"
            draggable="true"
            data-type={item.type}
            ondragstart={handlePaletteDragStart}
          >
            <span class="palette-icon" style={item.iconStyle}>{item.icon}</span>
            <div class="palette-info">
              <span class="palette-label">{item.label}</span>
              <span class="palette-desc">{item.description}</span>
            </div>
          </div>
        </template>
      </div>

      <!-- Canvas -->
      <div
        class="studio-canvas"
        ondragover={handleCanvasDragOver}
        ondrop={handleCanvasDrop}
      >
        <!-- SVG layer for links, grid, temp connectors -->
        <div class="canvas-svg-container" lwc:dom="manual"></div>
        <!-- Node overlay: LWC components positioned over SVG, sharing zoom transform -->
        <div
          class="nodes-overlay"
          style={nodesOverlayTransform}
          onnodeselect={handleNodeSelectEvent}
          onnodedelete={handleNodeDeleteEvent}
          onnodecollapse={handleNodeCollapseEvent}
          onportdragstart={handlePortDragStartEvent}
          onnodedragstart={handleNodeDragStartEvent}
        >
          <template for:each={displayNodes} for:item="nodeItem">
            <c-workflow-node
              key={nodeItem.id}
              node-data={nodeItem.data}
              is-selected={nodeItem.isSelected}
              is-connect-target={nodeItem.isConnectTarget}
              is-executing={nodeItem.isExecuting}
              is-collapsed={nodeItem.isCollapsed}
              style={nodeItem.positionStyle}
              data-node-id={nodeItem.id}
              onclick={handleNodeClick}
            >
            </c-workflow-node>
          </template>
        </div>
        <!-- Minimap -->
        <div class="minimap-container" lwc:dom="manual"></div>
        <!-- Zoom indicator -->
        <div class="zoom-indicator">{zoomLabel}</div>

        <!-- Node action popover -->
        <template if:true={_popoverVisible}>
          <div class="popover-backdrop" onclick={handlePopoverDismiss}></div>
          <div
            class="node-action-popover"
            style={popoverStyle}
            onclick={handlePopoverContentClick}
          >
            <template if:true={isPopoverMain}>
              <button
                class="popover-item"
                data-action="newStage"
                onclick={handlePopoverAction}
              >
                <span class="popover-item-icon">📄</span>
                <span>Create New Stage</span>
              </button>
              <button
                class="popover-item"
                data-action="existingStage"
                onclick={handlePopoverAction}
              >
                <span class="popover-item-icon">🔗</span>
                <span>Transition to Existing Stage</span>
              </button>
            </template>
            <template if:true={isPopoverStageList}>
              <button
                class="popover-back"
                data-action="back"
                onclick={handlePopoverAction}
              >
                ← Back
              </button>
              <div class="popover-stage-list">
                <template for:each={popoverStageItems} for:item="stage">
                  <button
                    key={stage.id}
                    class="popover-item"
                    data-stage-id={stage.id}
                    onclick={handlePopoverStageSelect}
                  >
                    {stage.label}
                  </button>
                </template>
                <template if:true={popoverHasNoStages}>
                  <div class="popover-empty">No other stages available</div>
                </template>
              </div>
            </template>
          </div>
        </template>
      </div>

      <!-- Property Panel -->
      <div class={propertyPanelClass}>
        <template if:true={selectedNode}>
          <div class="prop-header">
            <span class="prop-header-icon" style={selectedNodeIconStyle}
              >{selectedNodeIcon}</span
            >
            <span class="prop-header-title">Edit {selectedNodeTypeLabel}</span>
            <button class="prop-close-btn" onclick={handleClosePropertyPanel}>
              &times;
            </button>
          </div>
          <div class="prop-body">
            <div class="prop-field">
              <label class="prop-label">Name</label>
              <input
                type="text"
                class="prop-input"
                value={selectedNode.label}
                data-field="label"
                onchange={handlePropertyChange}
              />
            </div>

            <!-- Root-specific fields -->
            <template if:true={isSelectedRoot}>
              <div class="prop-field">
                <label class="prop-label">Lifecycle</label>
                <input
                  type="text"
                  class="prop-input"
                  value={selectedNode.lifecycle}
                  data-field="lifecycle"
                  onchange={handlePropertyChange}
                />
              </div>
              <div class="prop-field">
                <label class="prop-label">Criteria Fact</label>
                <input
                  type="text"
                  class="prop-input"
                  value={selectedNode.criteriaFact}
                  data-field="criteriaFact"
                  onchange={handlePropertyChange}
                />
              </div>
              <div class="prop-field">
                <label class="prop-label">Entry Criteria (JSON)</label>
                <textarea
                  class="prop-textarea prop-textarea--code"
                  data-field="entryCriteria"
                  onchange={handlePropertyChange}
                >
{selectedNode.entryCriteria}</textarea
                >
              </div>
              <div class="prop-field prop-field--row">
                <label class="prop-label prop-label--inline">Autostart</label>
                <input
                  type="checkbox"
                  checked={selectedNode.autostart}
                  data-field="autostart"
                  onchange={handlePropertyChange}
                />
              </div>
              <div class="prop-field prop-field--row">
                <label class="prop-label prop-label--inline">Active</label>
                <input
                  type="checkbox"
                  checked={selectedNode.isActive}
                  data-field="isActive"
                  onchange={handlePropertyChange}
                />
              </div>
            </template>

            <!-- Stage-specific fields -->
            <template if:true={isSelectedStage}>
              <div class="prop-field">
                <label class="prop-label">Lifecycle State</label>
                <input
                  type="text"
                  class="prop-input"
                  value={selectedNode.lifecycleState}
                  data-field="lifecycleState"
                  onchange={handlePropertyChange}
                />
              </div>
              <div class="prop-field">
                <label class="prop-label">Custom Label API Name</label>
                <input
                  type="text"
                  class="prop-input"
                  value={selectedNode.customLabelApiName}
                  data-field="customLabelApiName"
                  onchange={handlePropertyChange}
                />
              </div>
              <div class="prop-field prop-field--row">
                <label class="prop-label prop-label--inline"
                  >Allow Manual Transition</label
                >
                <input
                  type="checkbox"
                  checked={selectedNode.allowManualTransition}
                  data-field="allowManualTransition"
                  onchange={handlePropertyChange}
                />
              </div>
              <div class="prop-field prop-field--row">
                <label class="prop-label prop-label--inline">Final Stage</label>
                <input
                  type="checkbox"
                  checked={selectedNode.isFinalStage}
                  data-field="isFinalStage"
                  onchange={handlePropertyChange}
                />
              </div>
            </template>

            <!-- Delete: only for non-root nodes -->
            <template if:true={isSelectedDeletable}>
              <div class="prop-actions">
                <button
                  class="prop-btn prop-btn--danger"
                  onclick={handleDeleteSelectedNode}
                >
                  Delete Step
                </button>
              </div>
            </template>
          </div>
        </template>
        <template if:false={selectedNode}>
          <div class="prop-empty">
            <p>Select a workflow step to edit its properties</p>
          </div>
        </template>
      </div>
    </div>
  </div>
</template>
