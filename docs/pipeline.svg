<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="880" height="360" fill="#ffffff"/>
  <text x="440" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1b2733">How one frame is drawn</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1,2 L9,5 L1,8 Z" fill="#9aa7b4"/>
    </marker>
  </defs>

  <!-- box helper style via repeated groups -->
  <!-- Row 1 -->
  <g>
    <rect x="40"  y="70" width="160" height="56" rx="10" fill="#eef4ff" stroke="#066afe" stroke-width="1.5"/>
    <text x="120" y="94"  text-anchor="middle" font-size="13" font-weight="700" fill="#1b2733">1. Auto-layout</text>
    <text x="120" y="112" text-anchor="middle" font-size="11" fill="#5a6b7b">place every card</text>

    <rect x="260" y="70" width="160" height="56" rx="10" fill="#eef4ff" stroke="#066afe" stroke-width="1.5"/>
    <text x="340" y="94"  text-anchor="middle" font-size="13" font-weight="700" fill="#1b2733">2. Node boxes</text>
    <text x="340" y="112" text-anchor="middle" font-size="11" fill="#5a6b7b">snapshot obstacles</text>

    <rect x="480" y="70" width="160" height="56" rx="10" fill="#eef4ff" stroke="#066afe" stroke-width="1.5"/>
    <text x="560" y="94"  text-anchor="middle" font-size="13" font-weight="700" fill="#1b2733">3. Link ports</text>
    <text x="560" y="112" text-anchor="middle" font-size="11" fill="#5a6b7b">sides + lanes</text>

    <rect x="700" y="70" width="160" height="56" rx="10" fill="#eef4ff" stroke="#066afe" stroke-width="1.5"/>
    <text x="780" y="94"  text-anchor="middle" font-size="13" font-weight="700" fill="#1b2733">4. Back-edges</text>
    <text x="780" y="112" text-anchor="middle" font-size="11" fill="#5a6b7b">find cycles (DFS)</text>
  </g>

  <!-- Row 1 arrows -->
  <g stroke="#9aa7b4" stroke-width="1.5" marker-end="url(#arrow)">
    <line x1="200" y1="98" x2="256" y2="98"/>
    <line x1="420" y1="98" x2="476" y2="98"/>
    <line x1="640" y1="98" x2="696" y2="98"/>
  </g>
  <!-- wrap arrow row1 -> row2 -->
  <path d="M780,126 L780,160 L120,160 L120,194" fill="none" stroke="#9aa7b4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 2 -->
  <g>
    <rect x="40"  y="196" width="160" height="64" rx="10" fill="#fff5e6" stroke="#d29922" stroke-width="1.5"/>
    <text x="120" y="220" text-anchor="middle" font-size="13" font-weight="700" fill="#1b2733">5. Route wires</text>
    <text x="120" y="238" text-anchor="middle" font-size="11" fill="#5a6b7b">A* on Hanan grid</text>
    <text x="120" y="252" text-anchor="middle" font-size="11" fill="#5a6b7b">(fallbacks if null)</text>

    <rect x="260" y="196" width="160" height="64" rx="10" fill="#eef4ff" stroke="#066afe" stroke-width="1.5"/>
    <text x="340" y="224" text-anchor="middle" font-size="13" font-weight="700" fill="#1b2733">6. Line jumps</text>
    <text x="340" y="242" text-anchor="middle" font-size="11" fill="#5a6b7b">arcs at crossings</text>

    <rect x="480" y="196" width="160" height="64" rx="10" fill="#eef4ff" stroke="#066afe" stroke-width="1.5"/>
    <text x="560" y="224" text-anchor="middle" font-size="13" font-weight="700" fill="#1b2733">7. Build path</text>
    <text x="560" y="242" text-anchor="middle" font-size="11" fill="#5a6b7b">corners → SVG "d"</text>

    <rect x="700" y="196" width="160" height="64" rx="10" fill="#e8f7ee" stroke="#4bca81" stroke-width="1.5"/>
    <text x="780" y="224" text-anchor="middle" font-size="13" font-weight="700" fill="#1b2733">8. D3 renders</text>
    <text x="780" y="242" text-anchor="middle" font-size="11" fill="#5a6b7b">+ minimap mirror</text>
  </g>

  <!-- Row 2 arrows -->
  <g stroke="#9aa7b4" stroke-width="1.5" marker-end="url(#arrow)">
    <line x1="200" y1="228" x2="256" y2="228"/>
    <line x1="420" y1="228" x2="476" y2="228"/>
    <line x1="640" y1="228" x2="696" y2="228"/>
  </g>

  <!-- loop note -->
  <text x="440" y="320" text-anchor="middle" font-size="12" fill="#5a6b7b">Every edit (drag, add, delete) re-runs this loop:  change _nodes / _links  →  _autoLayout()  →  _renderLinks()</text>
</svg>
