<template>
    <lightning-card>
        <lightning-tabset>
            <lightning-tab label="Details">
                <div class="slds-p-around_medium">

                    <!-- Contact Information Section -->
                    <div class="slds-section slds-is-open slds-m-bottom_medium">
                        <p>Model: Sonnet</p>
                        <h3 class="slds-section__title slds-theme_shade">
                            <span class="slds-truncate slds-p-horizontal_small" title="Contact Information">Contact Information</span>
                        </h3>
                        <div class="slds-section__content slds-p-top_small">

                            <!-- Owner | Phone -->
                            <div class="slds-grid slds-gutters slds-m-bottom_small">
                                <div class="slds-col slds-size_1-of-2">
                                    <div class="slds-form-element">
                                        <label class="slds-form-element__label slds-text-title_bold">Owner</label>
                                        <div class="slds-form-element__control">
                                            <div class="slds-media slds-media_center">
                                                <div class="slds-media__figure">
                                                    <lightning-avatar
                                                        src={ownerPhotoUrl}
                                                        fallback-icon-name="standard:user"
                                                        size="small"
                                                        variant="circle"
                                                        alternative-text="Owner">
                                                    </lightning-avatar>
                                                </div>
                                                <div class="slds-media__body slds-align-middle">
                                                    <span class="owner-name">{ownerName}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input
                                        type="tel"
                                        label="Phone"
                                        value={formData.phone}
                                        onchange={handleFieldChange}
                                        data-field="phone"
                                        placeholder="Enter Phone">
                                    </lightning-input>
                                </div>
                            </div>

                            <!-- Name Group -->
                            <div class="slds-form-element slds-m-bottom_small">
                                <div class="name-group-label slds-m-bottom_x-small">
                                    <abbr class="slds-required" title="required">*</abbr>
                                    <span class="slds-text-title_bold slds-m-left_xx-small">Name</span>
                                </div>
                                <!-- Salutation | Home Phone -->
                                <div class="slds-grid slds-gutters slds-m-bottom_x-small">
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-combobox
                                            label="Salutation"
                                            value={formData.salutation}
                                            options={salutationOptions}
                                            onchange={handleFieldChange}
                                            data-field="salutation"
                                            placeholder="Enter Your Name">
                                        </lightning-combobox>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input
                                            type="tel"
                                            label="Home Phone"
                                            value={formData.homePhone}
                                            onchange={handleFieldChange}
                                            data-field="homePhone">
                                        </lightning-input>
                                    </div>
                                </div>
                                <!-- First Name | Other Phone -->
                                <div class="slds-grid slds-gutters slds-m-bottom_x-small">
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input
                                            label="First Name"
                                            required
                                            value={formData.firstName}
                                            onchange={handleFieldChange}
                                            data-field="firstName"
                                            placeholder="First Name">
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input
                                            type="tel"
                                            label="Other Phone"
                                            value={formData.otherPhone}
                                            onchange={handleFieldChange}
                                            data-field="otherPhone">
                                        </lightning-input>
                                    </div>
                                </div>
                                <!-- Middle Name | Fax -->
                                <div class="slds-grid slds-gutters slds-m-bottom_x-small">
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input
                                            label="Middle Name"
                                            value={formData.middleName}
                                            onchange={handleFieldChange}
                                            data-field="middleName"
                                            placeholder="Middle Name">
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input
                                            type="tel"
                                            label="Fax"
                                            value={formData.fax}
                                            onchange={handleFieldChange}
                                            data-field="fax">
                                        </lightning-input>
                                    </div>
                                </div>
                                <!-- Last Name | Email -->
                                <div class="slds-grid slds-gutters">
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input
                                            label="Last Name"
                                            required
                                            value={formData.lastName}
                                            onchange={handleFieldChange}
                                            data-field="lastName"
                                            placeholder="Last Name">
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input
                                            type="email"
                                            label="Email"
                                            value={formData.email}
                                            onchange={handleFieldChange}
                                            data-field="email">
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>

                            <!-- Title | Assistant -->
                            <div class="slds-grid slds-gutters slds-m-bottom_small">
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input
                                        label="Title"
                                        value={formData.title}
                                        onchange={handleFieldChange}
                                        data-field="title">
                                    </lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input
                                        label="Assistant"
                                        value={formData.assistant}
                                        onchange={handleFieldChange}
                                        data-field="assistant">
                                    </lightning-input>
                                </div>
                            </div>

                            <!-- Department | Asst. Phone -->
                            <div class="slds-grid slds-gutters slds-m-bottom_small">
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input
                                        label="Department"
                                        value={formData.department}
                                        onchange={handleFieldChange}
                                        data-field="department">
                                    </lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input
                                        type="tel"
                                        label="Asst. Phone"
                                        value={formData.assistantPhone}
                                        onchange={handleFieldChange}
                                        data-field="assistantPhone">
                                    </lightning-input>
                                </div>
                            </div>

                            <!-- Birthdate (left column only) -->
                            <div class="slds-grid slds-gutters slds-m-bottom_small">
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input
                                        type="date"
                                        label="Birthdate"
                                        value={formData.birthdate}
                                        onchange={handleFieldChange}
                                        data-field="birthdate"
                                        placeholder="Select a date…">
                                    </lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-2"></div>
                            </div>

                            <!-- Reports To (record lookup, left column only) -->
                            <div class="slds-grid slds-gutters slds-m-bottom_small">
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-record-picker
                                        label="Reports To"
                                        placeholder="Search Contacts..."
                                        object-api-name="Contact"
                                        value={formData.reportsToId}
                                        onchange={handleReportsToChange}>
                                    </lightning-record-picker>
                                </div>
                                <div class="slds-col slds-size_1-of-2"></div>
                            </div>

                            <!-- Lead Source (record lookup, left column only) -->
                            <div class="slds-grid slds-gutters slds-m-bottom_small">
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-record-picker
                                        label="Lead Source"
                                        placeholder="--None--"
                                        object-api-name="Campaign"
                                        value={formData.leadSourceId}
                                        onchange={handleLeadSourceChange}>
                                    </lightning-record-picker>
                                </div>
                                <div class="slds-col slds-size_1-of-2"></div>
                            </div>

                        </div>
                    </div>

                    <!-- Address Information Section -->
                    <div class="slds-section slds-is-open slds-m-bottom_medium">
                        <h3 class="slds-section__title slds-theme_shade">
                            <span class="slds-truncate slds-p-horizontal_small" title="Address Information">Address Information</span>
                        </h3>
                        <div class="slds-section__content slds-p-top_small">
                            <div class="slds-grid slds-gutters">

                                <!-- Mailing Address -->
                                <div class="slds-col slds-size_1-of-2">
                                    <p class="slds-text-title_bold slds-m-bottom_x-small">Mailing Address</p>
                                    <lightning-textarea
                                        label="Mailing Street"
                                        value={formData.mailingStreet}
                                        onchange={handleFieldChange}
                                        data-field="mailingStreet">
                                    </lightning-textarea>
                                    <div class="slds-grid slds-gutters slds-m-top_small">
                                        <div class="slds-col slds-size_1-of-2">
                                            <lightning-input
                                                label="Mailing City"
                                                value={formData.mailingCity}
                                                onchange={handleFieldChange}
                                                data-field="mailingCity">
                                            </lightning-input>
                                        </div>
                                        <div class="slds-col slds-size_1-of-2">
                                            <lightning-input
                                                label="Mailing State/Province"
                                                value={formData.mailingState}
                                                onchange={handleFieldChange}
                                                data-field="mailingState">
                                            </lightning-input>
                                        </div>
                                    </div>
                                    <div class="slds-grid slds-gutters slds-m-top_small">
                                        <div class="slds-col slds-size_1-of-2">
                                            <lightning-input
                                                label="Mailing Zip/Postal Code"
                                                value={formData.mailingPostalCode}
                                                onchange={handleFieldChange}
                                                data-field="mailingPostalCode">
                                            </lightning-input>
                                        </div>
                                        <div class="slds-col slds-size_1-of-2">
                                            <lightning-input
                                                label="Mailing Country"
                                                value={formData.mailingCountry}
                                                onchange={handleFieldChange}
                                                data-field="mailingCountry">
                                            </lightning-input>
                                        </div>
                                    </div>
                                </div>

                                <!-- Other Address -->
                                <div class="slds-col slds-size_1-of-2">
                                    <p class="slds-text-title_bold slds-m-bottom_x-small">Other Address</p>
                                    <lightning-textarea
                                        label="Other Street"
                                        value={formData.otherStreet}
                                        onchange={handleFieldChange}
                                        data-field="otherStreet">
                                    </lightning-textarea>
                                    <div class="slds-grid slds-gutters slds-m-top_small">
                                        <div class="slds-col slds-size_1-of-2">
                                            <lightning-input
                                                label="Other City"
                                                value={formData.otherCity}
                                                onchange={handleFieldChange}
                                                data-field="otherCity">
                                            </lightning-input>
                                        </div>
                                        <div class="slds-col slds-size_1-of-2">
                                            <lightning-input
                                                label="Other State/Province"
                                                value={formData.otherState}
                                                onchange={handleFieldChange}
                                                data-field="otherState">
                                            </lightning-input>
                                        </div>
                                    </div>
                                    <div class="slds-grid slds-gutters slds-m-top_small">
                                        <div class="slds-col slds-size_1-of-2">
                                            <lightning-input
                                                label="Other Zip/Postal Code"
                                                value={formData.otherPostalCode}
                                                onchange={handleFieldChange}
                                                data-field="otherPostalCode">
                                            </lightning-input>
                                        </div>
                                        <div class="slds-col slds-size_1-of-2">
                                            <lightning-input
                                                label="Other Country"
                                                value={formData.otherCountry}
                                                onchange={handleFieldChange}
                                                data-field="otherCountry">
                                            </lightning-input>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>

                    <!-- Description Information Section -->
                    <div class="slds-section slds-is-open slds-m-bottom_medium">
                        <h3 class="slds-section__title slds-theme_shade">
                            <span class="slds-truncate slds-p-horizontal_small" title="Description Information">Description Information</span>
                        </h3>
                        <div class="slds-section__content slds-p-top_small">
                            <lightning-textarea
                                label="Description"
                                value={formData.description}
                                onchange={handleFieldChange}
                                data-field="description">
                            </lightning-textarea>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="slds-grid slds-grid_align-end slds-gutters slds-m-top_medium">
                        <div class="slds-col slds-shrink">
                            <lightning-button
                                label="Cancel"
                                onclick={handleCancel}>
                            </lightning-button>
                        </div>
                        <div class="slds-col slds-shrink">
                            <lightning-button
                                variant="brand"
                                label="Save"
                                onclick={handleSave}
                                disabled={isLoading}>
                            </lightning-button>
                        </div>
                    </div>

                </div>
            </lightning-tab>
            <lightning-tab label="User Roles">
                <div class="slds-p-around_medium">
                    <p class="slds-text-body_regular slds-text-color_weak">User Roles content goes here.</p>
                </div>
            </lightning-tab>
        </lightning-tabset>
    </lightning-card>
</template>
