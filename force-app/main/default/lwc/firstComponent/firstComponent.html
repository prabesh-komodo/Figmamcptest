<template>
    <!-- Due Diligence Task Card - SLDS + Lightning (with design-specific overrides) -->
    <div class="task-card-container">
        <lightning-card>
            <div slot="title" class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                <h2 class="slds-text-heading_small slds-truncate">Due Diligence</h2>
                <span class="status-badge-open">Open</span>
            </div>

            <div class="slds-card__body_inner">
                <!-- Content that should clip (overflow hidden intentional) -->
                <div class="task-card-content-clip">
                <!-- Description -->
                <div class="slds-form-element slds-m-bottom_small">
                    <label class="slds-form-element__label slds-text-color_weak slds-text-body_small">Description</label>
                    <div class="slds-form-element__control slds-m-top_xx-small">
                        <p class="slds-text-body_regular">Follow up on why this request is on the draft state.</p>
                    </div>
                </div>

                <!-- Divider -->
                <div class="slds-divider_bottom slds-m-vertical_small"></div>

                <!-- Details: Due Date | Assigned To -->
                <div class="slds-grid slds-gutters_large slds-wrap slds-m-bottom_small">
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <div class="slds-form-element">
                            <label class="slds-form-element__label slds-text-color_weak slds-text-body_small">Due Date</label>
                            <div class="slds-form-element__control slds-m-top_xx-small">
                                <p class="slds-text-body_regular">04-24-2025</p>
                            </div>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <div class="slds-form-element">
                            <label class="slds-form-element__label slds-text-color_weak slds-text-body_small">Assigned To</label>
                            <div class="slds-form-element__control slds-m-top_xx-small">
                                <div class="slds-grid slds-grid_vertical-align-center slds-gutters_xx-small">
                                    <lightning-icon icon-name="standard:user" size="x-small" class="slds-icon-text-default"></lightning-icon>
                                    <a href="#" class="slds-link">Dough Feinch</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Divider -->
                <div class="slds-divider_bottom slds-m-vertical_small">                </div>
                </div>

                <!-- Combobox - outside clip area so dropdown options are not cut off -->
                <div class="combobox-dropdown-escape slds-m-bottom_small">
                    <lightning-combobox name="status" label="Status" value={selectedValue} options={statusOptions} placeholder="Choose an option" onchange={handleStatusChange}></lightning-combobox>
                </div>

                <!-- Action buttons -->
                <div class="slds-grid slds-grid_align-spread slds-gutters_small slds-m-top_small">
                    <div class="slds-col">
                        <lightning-button variant="neutral" label="Transfer" icon-name="utility:recycle" icon-position="left"></lightning-button>
                    </div>
                    <div class="slds-col">
                        <lightning-button variant="brand" label="View Activity" icon-name="utility:preview" icon-position="left"></lightning-button>
                    </div>
                </div>
            </div>
        </lightning-card>
    </div>
</template>
