<template>
    <article class="account-form">
        <ul class="slds-tabs_default__nav" role="tablist">
            <li class="slds-tabs_default__item slds-is-active" role="presentation">
                <a class="slds-tabs_default__link" href="javascript:void(0);" role="tab" tabindex="0" aria-selected="true" id="details-tab">Details</a>
            </li>
        </ul>

        <lightning-card title="New Contact" icon-name="standard:contact">
            <div class="slds-p-around_medium">
                <!-- Contact Information -->
                <section class="slds-m-bottom_medium" aria-labelledby="contact-info-heading">
                    <h2 id="contact-info-heading" class="slds-text-heading_small slds-m-bottom_small slds-border_bottom slds-p-bottom_x-small">Contact Information</h2>
                    <div class="slds-grid slds-wrap slds-gutters">
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <div class="slds-form-element slds-m-bottom_small">
                                <label class="slds-form-element__label" for="owner-readonly">Owner</label>
                                <div class="slds-form-element__control slds-form-element__control_readonly">
                                    <span id="owner-readonly" class="slds-form-element__static" aria-readonly="true">{currentUserName}</span>
                                </div>
                            </div>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-input name="Phone" label="Phone" type="tel" placeholder="Enter Phone" required class="slds-m-bottom_small"></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-combobox name="Salutation" label="Salutation" value="" options={salutationOptionsWithEmpty} placeholder="Enter Your Name" class="slds-m-bottom_small"></lightning-combobox>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-input name="HomePhone" label="Home Phone" type="tel" class="slds-m-bottom_small"></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-input name="FirstName" label="First Name" placeholder="First Name" required class="slds-m-bottom_small"></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-input name="OtherPhone" label="Other Phone" type="tel" class="slds-m-bottom_small"></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-input name="MiddleName" label="Middle Name" placeholder="Middle Name" class="slds-m-bottom_small"></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-input name="Fax" label="Fax" type="tel" class="slds-m-bottom_small"></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-input name="LastName" label="Last Name" placeholder="Last Name" required class="slds-m-bottom_small"></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-input name="Email" label="Email" type="email" class="slds-m-bottom_small"></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-input name="Title" label="Title" class="slds-m-bottom_small"></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-input name="AssistantName" label="Assistant" class="slds-m-bottom_small"></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-input name="Department" label="Department" class="slds-m-bottom_small"></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-input name="AssistantPhone" label="Asst. Phone" type="tel" class="slds-m-bottom_small"></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-input name="Birthdate" label="Birthdate" type="date" placeholder="Select a date..." class="slds-m-bottom_small"></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <div class="account-form__relates-to slds-m-bottom_small">
                                <lightning-combobox name="ReportsToId" label="Relates To" value="" options={reportsToOptionsWithEmpty} placeholder="Search Contacts..." dropdown-alignment="auto" class="account-form__relates-to-combobox"></lightning-combobox>
                                <span class="account-form__relates-to-icon" aria-hidden="true">
                                    <lightning-icon icon-name="utility:search" size="x-small" alternative-text="Search"></lightning-icon>
                                </span>
                            </div>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-combobox name="LeadSource" label="Lead Source" value="" options={leadSourceOptionsWithEmpty} class="slds-m-bottom_small"></lightning-combobox>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-input name="MobilePhone" label="Mobile Phone" type="tel" class="slds-m-bottom_small"></lightning-input>
                        </div>
                    </div>
                </section>

                <!-- Address Information: two columns (Mailing | Other), each with street then 2-column sub-grid -->
                <section class="slds-m-bottom_medium" aria-labelledby="address-info-heading">
                    <h2 id="address-info-heading" class="slds-text-heading_small slds-m-bottom_small slds-border_bottom slds-p-bottom_x-small">Address Information</h2>
                    <div class="slds-grid slds-wrap slds-gutters">
                        <!-- Left column: Mailing Address -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-textarea name="MailingStreet" label="Mailing Street" class="slds-m-bottom_small"></lightning-textarea>
                            <div class="slds-grid slds-wrap slds-gutters">
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                    <lightning-input name="MailingCity" label="Mailing City" class="slds-m-bottom_small"></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                    <lightning-input name="MailingState" label="Mailing State/Province" class="slds-m-bottom_small"></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                    <lightning-input name="MailingPostalCode" label="Mailing Zip/Postal Code" class="slds-m-bottom_small"></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                    <lightning-input name="MailingCountry" label="Mailing Country" class="slds-m-bottom_small"></lightning-input>
                                </div>
                            </div>
                        </div>
                        <!-- Right column: Other Address -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-textarea name="OtherStreet" label="Other Street" class="slds-m-bottom_small"></lightning-textarea>
                            <div class="slds-grid slds-wrap slds-gutters">
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                    <lightning-input name="OtherCity" label="Other City" class="slds-m-bottom_small"></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                    <lightning-input name="OtherState" label="Other State/Province" class="slds-m-bottom_small"></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                    <lightning-input name="OtherPostalCode" label="Other Zip/Postal Code" class="slds-m-bottom_small"></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                    <lightning-input name="OtherCountry" label="Other Country" class="slds-m-bottom_small"></lightning-input>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Description Information -->
                <section class="slds-m-bottom_medium" aria-labelledby="description-info-heading">
                    <h2 id="description-info-heading" class="slds-text-heading_small slds-m-bottom_small slds-border_bottom slds-p-bottom_x-small">Description Information</h2>
                    <div class="slds-grid slds-wrap slds-gutters">
                        <div class="slds-col slds-size_1-of-1">
                            <lightning-textarea name="Description" label="Description" class="slds-m-bottom_small"></lightning-textarea>
                        </div>
                    </div>
                </section>

                <div class="slds-grid slds-grid_align-end slds-m-top_medium">
                    <lightning-button
                        label="Save Contact"
                        variant="brand"
                        onclick={handleSubmit}
                        disabled={isSaving}
                        title="Save Contact">
                    </lightning-button>
                </div>
            </div>
        </lightning-card>
    </article>
</template>
