<template>
    <lightning-card>
        <lightning-tabset active-tab-value="details">
            <lightning-tab label="Details" value="details">

                <!-- Contact Information Section -->
                <div class="section-container">
                    <div class="slds-p-bottom_small">
                        <p>Model: Opus</p>
                        <div class="section-header">
                            <span class="section-title">Contact Information</span>
                        </div>
                    </div>
                    <div class="slds-grid slds-wrap slds-gutters_small">

                        <!-- Owner (read-only) -->
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                            <div class="readonly-field">
                                <label class="field-label">Owner</label>
                                <div class="readonly-value">
                                    <lightning-icon icon-name="standard:user" size="x-small" class="slds-m-right_xx-small"></lightning-icon>
                                    <span class="owner-name">{ownerName}</span>
                                </div>
                            </div>
                        </div>

                        <!-- Phone -->
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                            <lightning-input
                                type="tel"
                                label="Phone"
                                value={phone}
                                data-field="Phone"
                                onchange={handleInputChange}
                            ></lightning-input>
                        </div>

                        <!-- Name Group Label -->
                        <div class="slds-col slds-size_1-of-1 slds-p-bottom_xx-small slds-p-top_x-small">
                            <span class="group-label"><abbr class="slds-required" title="required">*</abbr> Name</span>
                        </div>

                        <!-- Salutation -->
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                            <lightning-combobox
                                label="Salutation"
                                value={salutation}
                                options={salutationOptions}
                                data-field="Salutation"
                                onchange={handleInputChange}
                            ></lightning-combobox>
                        </div>

                        <!-- Home Phone -->
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                            <lightning-input
                                type="tel"
                                label="Home Phone"
                                value={homePhone}
                                data-field="HomePhone"
                                onchange={handleInputChange}
                            ></lightning-input>
                        </div>

                        <!-- First Name (required) -->
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                            <lightning-input
                                type="text"
                                label="First Name"
                                value={firstName}
                                required
                                data-field="FirstName"
                                onchange={handleInputChange}
                            ></lightning-input>
                        </div>

                        <!-- Other Phone -->
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                            <lightning-input
                                type="tel"
                                label="Other Phone"
                                value={otherPhone}
                                data-field="OtherPhone"
                                onchange={handleInputChange}
                            ></lightning-input>
                        </div>

                        <!-- Middle Name -->
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                            <lightning-input
                                type="text"
                                label="Middle Name"
                                value={middleName}
                                data-field="MiddleName"
                                onchange={handleInputChange}
                            ></lightning-input>
                        </div>

                        <!-- Fax -->
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                            <lightning-input
                                type="tel"
                                label="Fax"
                                value={fax}
                                data-field="Fax"
                                onchange={handleInputChange}
                            ></lightning-input>
                        </div>

                        <!-- Last Name (required) -->
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                            <lightning-input
                                type="text"
                                label="Last Name"
                                value={lastName}
                                required
                                data-field="LastName"
                                onchange={handleInputChange}
                            ></lightning-input>
                        </div>

                        <!-- Email -->
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                            <lightning-input
                                type="email"
                                label="Email"
                                value={email}
                                data-field="Email"
                                onchange={handleInputChange}
                            ></lightning-input>
                        </div>

                        <!-- Title -->
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                            <lightning-input
                                type="text"
                                label="Title"
                                value={title}
                                data-field="Title"
                                onchange={handleInputChange}
                            ></lightning-input>
                        </div>

                        <!-- Assistant -->
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                            <lightning-input
                                type="text"
                                label="Assistant"
                                value={assistantName}
                                data-field="AssistantName"
                                onchange={handleInputChange}
                            ></lightning-input>
                        </div>

                        <!-- Department -->
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                            <lightning-input
                                type="text"
                                label="Department"
                                value={department}
                                data-field="Department"
                                onchange={handleInputChange}
                            ></lightning-input>
                        </div>

                        <!-- Asst. Phone -->
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                            <lightning-input
                                type="tel"
                                label="Asst. Phone"
                                value={assistantPhone}
                                data-field="AssistantPhone"
                                onchange={handleInputChange}
                            ></lightning-input>
                        </div>

                        <!-- Birthdate (left column only) -->
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                            <lightning-input
                                type="date"
                                label="Birthdate"
                                value={birthdate}
                                data-field="Birthdate"
                                onchange={handleInputChange}
                            ></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small"></div>

                        <!-- Reports To (left column only, record lookup) -->
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                            <lightning-record-picker
                                label="Reports To"
                                placeholder="Search Contacts..."
                                object-api-name="Contact"
                                value={reportsToId}
                                onchange={handleReportsToChange}
                            ></lightning-record-picker>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small"></div>

                        <!-- Lead Source (left column only, record lookup) -->
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                            <lightning-record-picker
                                label="Lead Source"
                                placeholder="--None--"
                                object-api-name="Lead"
                                value={leadSourceId}
                                onchange={handleLeadSourceChange}
                            ></lightning-record-picker>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small"></div>

                        <!-- Account Name (for linking to Account) -->
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                            <lightning-input
                                type="text"
                                label="Account Name"
                                value={accountName}
                                data-field="AccountName"
                                onchange={handleAccountNameChange}
                                placeholder="Enter Account Name to link or create"
                            ></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small"></div>
                    </div>
                </div>

                <!-- Address Information Section -->
                <div class="section-container">
                    <div class="slds-p-bottom_small">
                        <div class="section-header">
                            <span class="section-title">Address Information</span>
                        </div>
                    </div>
                    <div class="slds-grid slds-wrap slds-gutters_small">

                        <!-- Mailing Address Group Label -->
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_xx-small">
                            <span class="group-label">Mailing Address</span>
                        </div>

                        <!-- Other Address Group Label -->
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_xx-small">
                            <span class="group-label">Other Address</span>
                        </div>

                        <!-- Mailing Street -->
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                            <lightning-textarea
                                label="Mailing Street"
                                value={mailingStreet}
                                data-field="MailingStreet"
                                onchange={handleInputChange}
                            ></lightning-textarea>
                        </div>

                        <!-- Other Street -->
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                            <lightning-textarea
                                label="Other Street"
                                value={otherStreet}
                                data-field="OtherStreet"
                                onchange={handleInputChange}
                            ></lightning-textarea>
                        </div>

                        <!-- Mailing City + State -->
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                            <div class="slds-grid slds-gutters_xx-small">
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input
                                        type="text"
                                        label="Mailing City"
                                        value={mailingCity}
                                        data-field="MailingCity"
                                        onchange={handleInputChange}
                                    ></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input
                                        type="text"
                                        label="Mailing State/Province"
                                        value={mailingState}
                                        data-field="MailingState"
                                        onchange={handleInputChange}
                                    ></lightning-input>
                                </div>
                            </div>
                        </div>

                        <!-- Other City + State -->
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                            <div class="slds-grid slds-gutters_xx-small">
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input
                                        type="text"
                                        label="Other City"
                                        value={otherCity}
                                        data-field="OtherCity"
                                        onchange={handleInputChange}
                                    ></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input
                                        type="text"
                                        label="Other State/Province"
                                        value={otherState}
                                        data-field="OtherState"
                                        onchange={handleInputChange}
                                    ></lightning-input>
                                </div>
                            </div>
                        </div>

                        <!-- Mailing Zip + Country -->
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                            <div class="slds-grid slds-gutters_xx-small">
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input
                                        type="text"
                                        label="Mailing Zip/Postal Code"
                                        value={mailingPostalCode}
                                        data-field="MailingPostalCode"
                                        onchange={handleInputChange}
                                    ></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input
                                        type="text"
                                        label="Mailing Country"
                                        value={mailingCountry}
                                        data-field="MailingCountry"
                                        onchange={handleInputChange}
                                    ></lightning-input>
                                </div>
                            </div>
                        </div>

                        <!-- Other Zip + Country -->
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                            <div class="slds-grid slds-gutters_xx-small">
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input
                                        type="text"
                                        label="Other Zip/Postal Code"
                                        value={otherPostalCode}
                                        data-field="OtherPostalCode"
                                        onchange={handleInputChange}
                                    ></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input
                                        type="text"
                                        label="Other Country"
                                        value={otherCountry}
                                        data-field="OtherCountry"
                                        onchange={handleInputChange}
                                    ></lightning-input>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Description Information Section -->
                <div class="section-container">
                    <div class="slds-p-bottom_small">
                        <div class="section-header">
                            <span class="section-title">Description Information</span>
                        </div>
                    </div>
                    <div class="slds-grid slds-wrap slds-gutters_small">
                        <div class="slds-col slds-size_1-of-1">
                            <lightning-textarea
                                label="Description"
                                value={description}
                                data-field="Description"
                                onchange={handleInputChange}
                            ></lightning-textarea>
                        </div>
                    </div>
                </div>

                <!-- Save / Cancel Buttons -->
                <div class="slds-m-top_medium slds-clearfix">
                    <div class="slds-float_right">
                        <lightning-button
                            label="Cancel"
                            variant="neutral"
                            onclick={handleCancel}
                            class="slds-m-right_x-small"
                        ></lightning-button>
                        <lightning-button
                            label="Save"
                            variant="brand"
                            onclick={handleSave}
                            disabled={isSaving}
                        ></lightning-button>
                    </div>
                </div>

            </lightning-tab>

            <lightning-tab label="User Roles" value="userRoles">
                <div class="slds-p-around_medium">
                    <p class="slds-text-body_regular slds-text-color_weak">User Roles content will appear here.</p>
                </div>
            </lightning-tab>
        </lightning-tabset>
    </lightning-card>
</template>
