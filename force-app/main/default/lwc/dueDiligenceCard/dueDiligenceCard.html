<template>
    <!-- Due Diligence card: SLDS card with title, description, due date, assignee, and actions -->
    <lightning-card title={title} icon-name="standard:task">
        <!-- Actions slot: Open button right-aligned in header -->
        <div slot="actions">
            <lightning-button
                variant="neutral"
                label="Open"
                icon-name="utility:open"
                onclick={handleOpen}
                class="slds-m-left_x-small"
            ></lightning-button>
        </div>

        <div class="slds-p-around_small">
            <!-- Description section with label and body -->
            <section class="slds-m-bottom_small" aria-labelledby="desc-label">
                <div class="slds-text-title slds-text-color_weak slds-m-bottom_xx-small" id="desc-label">
                    Description
                </div>
                <div class="slds-text-body_regular slds-p-bottom_small slds-border_bottom">
                    <template lwc:if={description}>{description}</template>
                    <template lwc:else>
                        <span class="slds-text-color_weak">—</span>
                    </template>
                </div>
            </section>

            <!-- Details: Due Date and Assigned To in two columns -->
            <section class="slds-m-bottom_small slds-border_bottom slds-p-bottom_small" aria-label="Task details">
                <div class="slds-grid slds-wrap slds-gutters_small">
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <div class="slds-form-element slds-form-element_stacked">
                            <label class="slds-form-element__label slds-text-title slds-text-color_weak" for="due-date-value">
                                Due Date
                            </label>
                            <div class="slds-form-element__control" id="due-date-value">{dueDate}</div>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <div class="slds-form-element slds-form-element_stacked">
                            <span class="slds-form-element__label slds-text-title slds-text-color_weak">
                                Assigned To
                            </span>
                            <div class="slds-form-element__control slds-m-top_xx-small">
                                <button
                                    type="button"
                                    class="slds-button slds-button_reset slds-align_absolute-center"
                                    onclick={handleAssignedToClick}
                                    aria-label="Assigned to {assignedToName}"
                                >
                                    <lightning-icon
                                        icon-name="utility:user"
                                        alternative-text=""
                                        size="x-small"
                                        class="slds-m-right_xx-small slds-current-color"
                                    ></lightning-icon>
                                    <span class="slds-text-link">{assignedToName}</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Action buttons: Transfer (neutral/outline) and View Activity (brand) -->
            <div class="slds-grid slds-wrap slds-gutters_x-small slds-m-top_small">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                    <lightning-button
                        variant="neutral"
                        label="Transfer"
                        icon-name="utility:swap"
                        onclick={handleTransfer}
                        class="slds-m-bottom_x-small slds-m-right_x-small"
                    ></lightning-button>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                    <lightning-button
                        variant="brand"
                        label="View Activity"
                        icon-name="utility:preview"
                        onclick={handleViewActivity}
                        class="slds-m-bottom_x-small"
                    ></lightning-button>
                </div>
            </div>
        </div>
    </lightning-card>
</template>
