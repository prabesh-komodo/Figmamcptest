<template>
    <div class="slds-p-around_medium">
        <!-- Details tab -->
        <div class="slds-tabs_default">
            <ul class="slds-tabs_default__list" role="tablist">
                <li class="slds-tabs_default__item slds-is-active" title="Details" role="presentation">
                    <a class="slds-tabs_default__link" href="javascript:void(0);" role="tab" tabindex="0" aria-selected="true">
                        Details
                    </a>
                </li>
            </ul>
        </div>

        <!-- Contact Information -->
        <lightning-card title="Contact Information" class="slds-m-top_small">
            <div class="slds-p-around_small">
                <div class="slds-grid slds-wrap slds-gutters">
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                        <div class="slds-form-element">
                            <label class="slds-form-element__label" for="owner">Owner</label>
                            <div class="slds-form-element__control slds-form-element__control_plain">
                                <lightning-icon icon-name="standard:user" size="small" alternative-text="" class="slds-m-right_xx-small"></lightning-icon>
                                <a href="javascript:void(0);" class="slds-text-link" onclick={handleOwnerClick}>{ownerName}</a>
                                <lightning-icon icon-name="utility:change_owner" size="x-small" alternative-text="Change owner" class="slds-m-left_xx-small"></lightning-icon>
                            </div>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                        <lightning-input name="phone" label="Phone" type="tel" placeholder="Enter Phone" value={phone} onchange={handleInputChange}></lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-p-bottom_small">
                        <div class="slds-form-element">
                            <span class="slds-form-element__label slds-required">Name</span>
                        </div>
                        <div class="slds-grid slds-wrap slds-gutters slds-m-left_small">
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4 slds-p-bottom_small">
                                <lightning-combobox name="salutation" label="Salutation" options={salutationOptions} value={salutation} placeholder="Enter Your Name" onchange={handleInputChange}></lightning-combobox>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4 slds-p-bottom_small">
                                <lightning-input name="firstName" label="First Name" required placeholder="First Name" value={firstName} onchange={handleInputChange}></lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4 slds-p-bottom_small">
                                <lightning-input name="middleName" label="Middle Name" placeholder="Middle Name" value={middleName} onchange={handleInputChange}></lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4 slds-p-bottom_small">
                                <lightning-input name="lastName" label="Last Name" required placeholder="Last Name" value={lastName} onchange={handleInputChange}></lightning-input>
                            </div>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                        <lightning-input name="homePhone" label="Home Phone" type="tel" value={homePhone} onchange={handleInputChange}></lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                        <lightning-input name="title" label="Title" value={title} onchange={handleInputChange}></lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                        <lightning-input name="otherPhone" label="Other Phone" type="tel" value={otherPhone} onchange={handleInputChange}></lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                        <lightning-input name="department" label="Department" value={department} onchange={handleInputChange}></lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                        <lightning-input name="fax" label="Fax" type="tel" value={fax} onchange={handleInputChange}></lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                        <lightning-input name="birthdate" label="Birthdate" type="date" placeholder="Select a date..." value={birthdate} onchange={handleInputChange}></lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                        <lightning-input name="email" label="Email" type="email" value={email} onchange={handleInputChange}></lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                        <lightning-input name="reportsTo" label="Reports To" placeholder="Search Contacts..." value={reportsTo} onchange={handleInputChange}></lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                        <lightning-input name="assistant" label="Assistant" value={assistant} onchange={handleInputChange}></lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                        <lightning-combobox name="leadSource" label="Lead Source" options={leadSourceOptions} value={leadSource} onchange={handleInputChange}></lightning-combobox>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                        <lightning-input name="asstPhone" label="Asst. Phone" type="tel" value={asstPhone} onchange={handleInputChange}></lightning-input>
                    </div>
                </div>
            </div>
        </lightning-card>

        <!-- Address Information -->
        <lightning-card title="Address Information" class="slds-m-top_small">
            <div class="slds-p-around_small">
                <div class="slds-grid slds-wrap slds-gutters">
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <div class="slds-text-title slds-m-bottom_small">Mailing Address</div>
                        <lightning-textarea name="mailingStreet" label="Mailing Street" value={mailingStreet} onchange={handleInputChange}></lightning-textarea>
                        <lightning-input name="mailingCity" label="Mailing City" value={mailingCity} onchange={handleInputChange} class="slds-m-top_small"></lightning-input>
                        <lightning-input name="mailingState" label="Mailing State/Province" value={mailingState} onchange={handleInputChange} class="slds-m-top_small"></lightning-input>
                        <lightning-input name="mailingZip" label="Mailing Zip/Postal Code" value={mailingZip} onchange={handleInputChange} class="slds-m-top_small"></lightning-input>
                        <lightning-input name="mailingCountry" label="Mailing Country" value={mailingCountry} onchange={handleInputChange} class="slds-m-top_small"></lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <div class="slds-text-title slds-m-bottom_small">Other Address</div>
                        <lightning-textarea name="otherStreet" label="Other Street" value={otherStreet} onchange={handleInputChange}></lightning-textarea>
                        <lightning-input name="otherCity" label="Other City" value={otherCity} onchange={handleInputChange} class="slds-m-top_small"></lightning-input>
                        <lightning-input name="otherState" label="Other State/Province" value={otherState} onchange={handleInputChange} class="slds-m-top_small"></lightning-input>
                        <lightning-input name="otherZip" label="Other Zip/Postal Code" value={otherZip} onchange={handleInputChange} class="slds-m-top_small"></lightning-input>
                        <lightning-input name="otherCountry" label="Other Country" value={otherCountry} onchange={handleInputChange} class="slds-m-top_small"></lightning-input>
                    </div>
                </div>
            </div>
        </lightning-card>

        <!-- Description Information -->
        <lightning-card title="Description Information" class="slds-m-top_small">
            <div class="slds-p-around_small">
                <lightning-textarea name="description" label="Description" value={description} onchange={handleInputChange}></lightning-textarea>
            </div>
        </lightning-card>
    </div>
</template>
