<template>
  <article
    class="auto-activity-card slds-box slds-grid slds-grid_vertical slds-p-horizontal_medium slds-p-top_medium slds-p-bottom_small"
  >
    <!-- Task Header -->
    <div
      class="slds-grid slds-grid_vertical-align-center slds-grid_align-spread slds-m-bottom_small"
    >
      <div class="slds-col slds-p-right_small slds-grow slds-shrink">
        <p class="slds-text-heading_small slds-text-title_bold slds-truncate">
          Due Diligence
        </p>
      </div>
      <div class="slds-grid slds-grid_vertical-align-center slds-shrink-none">
        <lightning-badge
          label="Open"
          class="slds-theme_warning slds-m-right_x-small"
        ></lightning-badge>
        <lightning-button-icon
          icon-name="utility:edit"
          variant="border"
          size="x-small"
          alternative-text="Edit activity"
          onclick={handleEdit}
        ></lightning-button-icon>
      </div>
    </div>

    <!-- Task Details -->
    <div class="slds-grid slds-grid_vertical">
      <!-- Description -->
      <div class="slds-grid slds-grid_vertical slds-m-bottom_small">
        <p
          class="slds-text-body_small slds-text-color_weak slds-m-bottom_xx-small"
        >
          Description
        </p>
        <p class="slds-text-body_regular slds-m-around_none">
          Follow up on why this request is on the draft state.
        </p>
      </div>

      <!-- Divider -->
      <div class="slds-p-vertical_x-small slds-m-bottom_small">
        <div class="slds-border_top"></div>
      </div>

      <!-- Task Metadata: Due Date | Assigned To -->
      <div class="slds-grid slds-gutters slds-m-bottom_small">
        <div class="slds-col slds-size_1-of-2">
          <p
            class="slds-text-body_small slds-text-color_weak slds-m-bottom_xx-small"
          >
            Due Date
          </p>
          <p class="slds-text-body_regular">04-24-2025</p>
        </div>
        <div class="slds-col slds-size_1-of-2">
          <p
            class="slds-text-body_small slds-text-color_weak slds-m-bottom_xx-small"
          >
            Assigned To
          </p>
          <div class="slds-grid slds-grid_vertical-align-center">
            <lightning-icon
              icon-name="utility:user"
              size="xx-small"
              class="slds-m-right_xx-small"
            ></lightning-icon>
            <span class="slds-text-body_small slds-text-color_brand"
              >Dough Feinch</span
            >
          </div>
        </div>
      </div>

      <!-- Divider -->
      <div class="slds-p-vertical_x-small slds-m-bottom_small">
        <div class="slds-border_top"></div>
      </div>

      <!-- Task Actions -->
      <div
        class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center"
      >
        <lightning-button
          variant="neutral"
          label="Transfer"
          icon-name="utility:product_transfer"
          icon-position="left"
          onclick={handleTransfer}
        ></lightning-button>
        <lightning-button
          variant="brand"
          label="View Activity"
          icon-name="utility:preview"
          icon-position="left"
          onclick={handleViewActivity}
        ></lightning-button>
      </div>
    </div>
  </article>
</template>
