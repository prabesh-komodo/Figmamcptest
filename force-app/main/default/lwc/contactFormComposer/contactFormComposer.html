<template>
    <lightning-card class="contact-form-composer">
        <lightning-tabset active-tab-value="details">
            <lightning-tab label="Details" value="details">

                <!-- Contact Information Section - fieldset -->
                <div class="section-container">
                    <p class="model-label">Model: Composer</p>
                    <fieldset class="fieldset-section">
                        <legend class="fieldset-legend">Contact Information</legend>

                        <lightning-record-edit-form
                            object-api-name="Contact"
                            onsubmit={handleSubmit}
                        >
                            <div class="slds-grid slds-wrap slds-gutters_small slds-p-top_small">

                                <!-- Owner (read-only) - not from field set -->
                                <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                                    <div class="readonly-field">
                                        <label class="field-label">Owner</label>
                                        <div class="readonly-value">
                                            <lightning-icon icon-name="standard:user" size="x-small" class="slds-m-right_xx-small"></lightning-icon>
                                            <span class="owner-name">{ownerName}</span>
                                        </div>
                                    </div>
                                </div>

                                <!-- Field set driven fields -->
                                <template for:each={fieldSetFields} for:item="field">
                                    <div key={field.fieldPath} class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                                        <lightning-input-field
                                            field-name={field.fieldPath}
                                            data-field-path={field.fieldPath}
                                        ></lightning-input-field>
                                    </div>
                                </template>

                                <!-- Account Name (custom - create by name, not in field set) -->
                                <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                                    <lightning-input
                                        type="text"
                                        label="Account Name"
                                        value={accountName}
                                        data-field="AccountName"
                                        onchange={handleAccountNameChange}
                                        placeholder="Enter Account Name to link or create"
                                    ></lightning-input>
                                </div>
                            </div>

                            <!-- Save / Cancel Buttons -->
                            <div class="slds-m-top_medium slds-clearfix">
                                <div class="slds-float_right">
                                    <lightning-button
                                        label="Cancel"
                                        variant="neutral"
                                        onclick={handleCancel}
                                        class="slds-m-right_x-small"
                                    ></lightning-button>
                                    <lightning-button
                                        label="Save"
                                        variant="brand"
                                        type="submit"
                                        disabled={isSaving}
                                    ></lightning-button>
                                </div>
                            </div>
                        </lightning-record-edit-form>
                    </fieldset>
                </div>

            </lightning-tab>
        </lightning-tabset>
    </lightning-card>
</template>
